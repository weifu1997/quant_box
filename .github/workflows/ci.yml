name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (${{ matrix.os }}, Python 3.11)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Install locked dependencies
        run: |
          python -m pip install "pip<24.1"
          python -m pip install -r requirements-lock.txt

      - name: Check Python environment
        run: python scripts/dev_env.py doctor --strict --backend-only --current-python

      - name: Run regression tests
        run: python -m pytest -q

  frontend:
    name: Frontend build (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Set up Python for shared environment checks
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Check frontend environment
        run: python scripts/dev_env.py doctor --strict --frontend-only

      - name: Type-check and build frontend
        working-directory: web
        run: npm run build

  browser:
    name: Playwright E2E (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        working-directory: web
        env:
          PLAYWRIGHT_CHANNEL: chromium
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: ignore
          retention-days: 7
