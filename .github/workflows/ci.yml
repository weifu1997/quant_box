name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: Windows Python 3.11
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt

      - name: Run regression tests
        run: >
          python -m pytest
          tests/test_common.py
          tests/test_data_fetcher.py
          tests/test_strategy.py
          tests/test_scoring.py
          tests/test_backtest.py
          tests/test_signal_generator.py
          tests/test_selection_risk.py
          tests/test_selection_constraints.py
          tests/test_risk_policy.py
          tests/test_monitoring.py
          tests/test_optimizer.py
          tests/test_run_auto_signal.py
          tests/test_config_loader.py::ConfigLoaderTests::test_default_quality_includes_full_backtest_return_and_drawdown_gates
          -q
