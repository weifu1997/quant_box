# Tushare HTTP proxy settings. Replace http_url/token with your real proxy values.
tushare:
  http_url: "http://your-proxy-server:8020/"
  token: "your_token"
  timeout: 30

data:
  start_date: "2015-01-01"
  history_start_date: "2012-01-01"
  end_date: "auto"
  target_date_cutoff_time: "20:00"
  timezone: "Asia/Shanghai"
  trade_calendar_lookback_days: 90
  universe: "mainboard_a"
  freq: "daily"
  raw_dir: "data/raw"
  constituents_file: "data/raw/mainboard_a_stocks.csv"
  hs300_constituents_file: "data/raw/hs300_constituents.csv"
  daily_basic_file: "data/factors/daily_basic.parquet"
  daily_batch_size: 20
  daily_window_days: 500
  max_new_symbols_per_run: null
  update_chunk_size: 300
  update_sleep_seconds: 0
  update_progress_file: "outputs/data_update_progress.json"
  retries: 2
  retry_max_wait: 1
  exclude_st: true
  st_calendar_file: "data/raw/st_calendar.csv"

qlib:
  provider_uri: "data/qlib_data"
  region: "cn"
  instruments: "mainboard_a"
  missing_value: null

factors:
  cache_file: "data/factors/alpha158.parquet"

fundamentals:
  fina_indicator_file: "data/fundamentals/fina_indicator.parquet"
  dividend_file: "data/fundamentals/dividend.parquet"
  fallback_lag_days: 120
  update_sleep_seconds: 0.0

fundamental_screen:
  include_in_auto_report: true
  auto_report_top_n: 10
  top_n: 30
  min_roe: 0.08
  max_debt_to_assets: 0.60
  min_dividend_yield: 0.015
  min_positive_dividend_years: 2
  dividend_lookback_years: 5
  min_ocf_to_opincome: 0.80
  min_fcf_yield: 0.0
  max_pe_ttm: 30.0
  max_pb: 5.0
  watch_min_score: 4
  market_cap_unit: 10000.0
  statement_amount_unit: 1.0
  prefer_annual_fina: true
  max_annual_report_age_days: 550

ml_strategy:
  enabled: false
  model_type: "ridge_numpy"
  model_objective: "regression"
  class_weight: "balanced"
  fallback_on_missing_model: false
  train_years: 3
  training_start_date: "auto"
  label_horizon_sessions: 20
  label_mode: "cross_sectional_top_quantile"
  label_return_adjustment: "raw"
  label_volatility_window: 20
  label_volatility_floor: 0.01
  label_min_cross_section_obs: 20
  label_top_quantile: 0.20
  label_bottom_quantile: 0.20
  rebalance_freq: "monthly"
  ensemble_window: 3
  feature_columns: null
  feature_limit: 158
  feature_ic_evolution: false
  feature_ic_window: 252
  feature_ic_top_k: 30
  feature_ic_min_periods: 60
  feature_ic_min_obs: 20
  feature_ic_min_abs_ic: 0.02
  feature_ic_method: "spearman"
  min_price_history_sessions: 240
  min_feature_fraction: 0.5
  min_train_rows: 20000
  max_train_rows: 80000
  random_state: 42
  label_clip: 0.30
  ridge_alpha: 10.0
  top_n: 15
  score_weighted: false
  target_annual_return: 0.20
  min_yearly_annual_return: 0.20
  max_drawdown_limit: -0.20
  training_neutralization:
    enabled: true
    industry: true
    market_cap: true
    market_cap_field: "circ_mv"
    min_obs: 20
  fundamental_factors_enabled: false
  # Reserved for future fundamental factors. Current Alpha158 features are price/volume only.
  fundamental_lag_days: 90

market_regime:
  enabled: true
  benchmark_file: null
  benchmark_symbol: null
  ma_window: 90
  momentum_window: 5
  volatility_window: 20
  min_periods: 60
  bull_momentum_min: 0.0
  bear_momentum_max: 0.0
  bear_drawdown_threshold: null
  drawdown_window: 252
  high_volatility_threshold: 999.0
  volatility_quantile_window: 252
  high_volatility_quantile: 0.75
  lag_days: 1

reporting_regime:
  enabled: true
  # Reporting regimes are objective period labels only and do not affect trades.
  lag_days: 0

defensive_timing:
  enabled: true
  bull_exposure: 1.0
  sideways_exposure: 1.0
  bear_exposure: 0.60
  exposure_rebalance_threshold: 0.05

neutralization:
  enabled: false
  industry: true
  market_cap: true
  market_cap_field: "circ_mv"
  min_obs: 20

feature_extensions:
  enabled: false
  daily_basic: true
  price_derived: true
  daily_basic_lag_days: 1
  price_feature_lag_sessions: 1
  daily_basic_fields:
    - "turnover_rate"
    - "turnover_rate_f"
    - "volume_ratio"
    - "pe_ttm"
    - "pb"
    - "ps_ttm"
    - "total_mv"
    - "circ_mv"
  price_features:
    - "low_amount_5"
    - "low_amount_20"
    - "low_amount_60"
    - "amount_log_20"
    - "return_20"
    - "return_60"
    - "volatility_20"
    - "illiquidity_20"
  min_coverage: 0.0

regime_score_blend:
  enabled: false
  bull_defensive_weight: 0.0
  sideways_defensive_weight: 0.5
  bear_defensive_weight: 1.0
  defensive_components:
    - column: "STD20"
      direction: -1.0
    - column: "BETA20"
      direction: -1.0
    - column: "ROC20"
      direction: 1.0

ic:
  window: 252
  min_periods: 60
  min_abs_ic: 0.02
  corr_threshold: 0.7
  top_k: 30
  weight_smoothing: 0.6
  max_weight_turnover: 0.5
  price_file: "data/prices/ohlcv_adjusted.parquet"
  weights_cache_enabled: true
  weights_cache_file: "data/factors/rolling_ic_weights.parquet"

dynamic_ic_selector:
  candidates:
    - "factor:LOW0"
    - "factor:VMA60"
    - "factor:VSUMN30"
    - "factor:VSUMN60"
    - "factor:VSUMN20"
    - "factor:VMA30"
    - "factor:VMA20"
    - "factor:MIN5"
    - "inverse_factor:KUP"
    - "inverse_factor:KLEN"
    - "inverse_factor:KLOW"
    - "inverse_factor:CORR5"
  horizon: 20
  window: 504
  min_periods: 120
  min_obs: 20
  method: "spearman"
  metric: "ic_ir"
  top_k: 3
  fallback_candidate: "factor:LOW0"

liquidity_filter:
  enabled: true
  field: "amount"
  window: 10
  min_periods: 5
  quantile: 0.65
  side: "high"

selection_risk_filter:
  enabled: true
  lookback_sessions: 3
  required_price_fields:
    - "open"
    - "close"
  max_missing_price_sessions: 0
  max_limit_down_days: 0
  limit_down_buffer: 0.0
  require_positive_volume: true

strategy:
  top_n: 15
  max_turnover: 1
  rank_buffer: 20
  factor_group: "momentum"
  rebalance_freq: "monthly"
  stop_loss_pct: null
  take_profit_pct: 0.35
  circuit_breaker_drawdown: null
  circuit_breaker_cooldown_days: 5
  circuit_breaker_target_exposure: 0.30
  max_industry_weight: null
  rebalance_drift_threshold: 0.02
  min_cross_section_obs: 5

validated_strategy:
  enabled: false
  candidate: ""
  summary_file: null
  require_is_acceptable: true

annual_state_router:
  enabled: true
  factor_file: "data/factors/codex_goal_extended_factors_20260610.parquet"
  industry_factor_file: "data/factors/codex_goal_industry_momentum_factors_20260611.parquet"
  selector_file: "outputs/selector_weight_lb63_top5_posprop_top5_formal_20260611_selector.csv"
  source_factor_files:
    db_size: "data/factors/codex_goal_extended_factors_20260610.parquet"
    db_total: "data/factors/codex_goal_extended_factors_20260610.parquet"
    selector: "data/factors/codex_goal_extended_factors_20260610.parquet"
  include_expanded_sources: true
  initial_source: "beta"
  missing_ret252_exposure: 0.70
  flat_negative_exposure: 0.90
  fallback_source: null
  full_turnover_on_route_change: true
  use_defensive_timing: true
  disable_equity_overlay: false
  moderate_positive_source: "roc60"
  moderate_positive_ret252_min: 0.20
  moderate_low_source: "beta20"
  moderate_low_ret252_min: 0.18
  moderate_low_ret252_max: 0.20
  moderate_low_exposure: 0.40
  strong_trailing_exposure: 0.80
  turnover_mode: "rank10"
  turnover_boost_reasons:
    - "low_vol_moderate_uptrend"
    - "moderate_positive_roc60"
  turnover_boost_max_turnover: 2
  turnover_boost_rank_buffer: 10
  evidence_metrics_file: "outputs/codex_router_grid_20260614_beta20_exposure_hit_metrics.json"
  evidence_years_file: "outputs/codex_router_grid_20260614_beta20_exposure_hit_years.csv"

backtest:
  initial_capital: 1000000
  commission: 0.0003
  min_commission_per_order: 5.0
  stamp_tax: 0.001
  transfer_fee: 0.00001
  annual_trading_days: 252
  trade_price_field: "open"
  valuation_price_field: "close"
  slippage: 0.0005
  dynamic_slippage_enabled: true
  dynamic_slippage_threshold: 0.02
  dynamic_slippage_multiplier: 2.0
  max_slippage: 0.03
  max_participation_rate: 0.05
  capacity_window: 20
  capacity_warning_threshold: 0.05
  amount_unit: 1000.0
  stale_price_exit_days: 20
  stale_price_exit_policy: "haircut_exit"
  stale_price_haircut: 0.5
  stop_fill_policy: "conservative"
  stop_fill_buffer: 0.005
  limit_up_threshold: 0.099
  limit_down_threshold: 0.099
  star_limit_up_threshold: 0.199
  star_limit_down_threshold: 0.199
  growth_limit_up_threshold: 0.199
  growth_limit_down_threshold: 0.199
  bj_limit_up_threshold: 0.299
  bj_limit_down_threshold: 0.299
  st_limit_up_threshold: 0.049
  st_limit_down_threshold: 0.049
  exposure_schedule_rebalance_on_signal_only: true
  equity_overlay:
    enabled: true
    min_periods: 60
    ma_window: 90
    momentum_window: 5
    drawdown_window: 60
    drawdown_cut: 0.15
    bull_exposure: 1.0
    sideways_exposure: 0.50
    bear_exposure: 0.50
    rebalance_threshold: 0.05
    rebalance_on_signal_only: true

quality:
  min_raw_coverage: 0.95
  min_price_coverage: 0.95
  min_factor_coverage: 0.95
  require_latest_end_date: true
  min_validation_windows: 3
  min_positive_return_rate: 0.5
  min_sharpe_mean: 0.0
  max_drawdown_limit: -0.20
  target_annual_return: 0.20
  min_optimizer_annual_return: 0.20
  min_backtest_annual_return: 0.20
  max_backtest_drawdown_limit: -0.20
  max_annual_turnover: 20.0
  max_annual_trade_cost_ratio: 0.2

account:
  file: "config/account.yaml"
  current_holdings_file: "config/current_holdings.csv"
  total_asset: 1000000
  cash: 0.0
  max_position_pct: null
  lot_size: 100
  star_market_lot_size: 200

manual_orders:
  limit_price_buffer: 0.002
  cash_redistribution_overweight_tolerance: 0.10
  confirmation_dir: "outputs/order_confirmations"
  fill_feedback_dir: "outputs/fill_feedback"
  confirmed_orders_file: "config/current_holdings.csv"

research:
  benchmark:
    method: "equal_weight_universe"
    symbol: null
    file: null
  exposure:
    industry_file: "data/raw/mainboard_a_stocks.csv"
    daily_basic_file: "data/factors/daily_basic.parquet"
    market_cap_field: "circ_mv"

data_governance:
  st_calendar_file: "data/raw/st_calendar.csv"
  index_constituents_file: "data/raw/hs300_constituents.csv"
  index_fallback_codes:
    - "399300.SZ"
  required_index_columns:
    - "index_code"
    - "con_code"
    - "trade_date"
    - "weight"
  min_daily_basic_date_coverage: 1.0
  min_index_constituents_month_coverage: 1.0
  adj_factor_meta_file: "data/factors/adj_factor_meta.json"

universe_builder:
  enabled: true
  require_file: true
  core_index_codes:
    - "000300.SH"
    - "000905.SH"
  satellite_index_code: "000852.SH"
  satellite_top_n: 300
  index_constituents_file: "data/raw/index_constituents.csv"
  output_file: "data/raw/historical_universe.csv"

reports:
  history_dir: "outputs/history"

outputs:
  dir: "outputs"
  holdings_file: "outputs/latest_holdings.csv"
