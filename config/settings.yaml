# Tushare HTTP proxy settings. Replace http_url/token with your real proxy values.
tushare:
  http_url: "http://your-proxy-server:8020/"
  token: "your_token"
  timeout: 30

data:
  start_date: "2015-01-01"
  end_date: "2025-12-31"
  universe: "hs300"
  freq: "daily"
  raw_dir: "data/raw"
  constituents_file: "data/raw/hs300_constituents.csv"

qlib:
  provider_uri: "data/qlib_data"
  region: "cn"
  instruments: "csi300"

factors:
  cache_file: "data/factors/alpha158.parquet"

ic:
  window: 252
  min_periods: 60
  min_abs_ic: 0.02
  corr_threshold: 0.7
  top_k: 30
  price_file: "data/prices/ohlcv.parquet"

strategy:
  top_n: 5
  max_turnover: 3
  rank_buffer: 0
  factor_group: "volatility"
  rebalance_freq: "weekly"

backtest:
  initial_capital: 1000000
  commission: 0.0003
  stamp_tax: 0.001
  annual_trading_days: 252

outputs:
  dir: "outputs"
  holdings_file: "outputs/latest_holdings.csv"

