# Tushare HTTP proxy settings. Replace http_url/token with your real proxy values.
tushare:
  http_url: "${TUSHARE_HTTP_URL}"
  token: "${TUSHARE_TOKEN}"
  timeout: 30

data:
  start_date: "2015-01-01"
  end_date: "auto"
  target_date_cutoff_time: "20:00"
  timezone: "Asia/Shanghai"
  trade_calendar_lookback_days: 90
  universe: "mainboard_a"
  freq: "daily"
  raw_dir: "data/raw"
  constituents_file: "data/raw/mainboard_a_stocks.csv"
  hs300_constituents_file: "data/raw/hs300_constituents.csv"
  daily_batch_size: 20
  daily_window_days: 500
  max_new_symbols_per_run: null
  update_chunk_size: 300
  update_sleep_seconds: 0
  update_progress_file: "outputs/data_update_progress.json"
  retries: 2
  retry_max_wait: 1
  exclude_st: true
  st_calendar_file: null

qlib:
  provider_uri: "data/qlib_data"
  region: "cn"
  instruments: "mainboard_a"
  missing_value: null

factors:
  cache_file: "data/factors/alpha158.parquet"

ml_strategy:
  enabled: false
  model_type: "auto"
  fallback_on_missing_model: true
  train_years: 3
  label_horizon_sessions: 20
  rebalance_freq: "monthly"
  feature_columns: null
  feature_limit: 64
  min_feature_fraction: 0.5
  min_train_rows: 20000
  max_train_rows: 80000
  random_state: 42
  label_clip: 0.30
  ridge_alpha: 10.0
  top_n: 15
  score_weighted: false
  fundamental_lag_days: 90

market_regime:
  enabled: true
  benchmark_file: null
  benchmark_symbol: null
  ma_window: 120
  momentum_window: 20
  volatility_window: 20
  min_periods: 60
  bull_momentum_min: 0.0
  bear_momentum_max: 0.0
  high_volatility_threshold: null
  volatility_quantile_window: 252
  high_volatility_quantile: 0.75
  lag_days: 1

defensive_timing:
  enabled: true
  bull_exposure: 1.0
  sideways_exposure: 0.85
  bear_exposure: 0.55
  exposure_rebalance_threshold: 0.05

ic:
  window: 252
  min_periods: 60
  min_abs_ic: 0.02
  corr_threshold: 0.7
  top_k: 30
  weight_smoothing: 0.6
  max_weight_turnover: 0.5
  price_file: "data/prices/ohlcv_adjusted.parquet"
  weights_cache_enabled: true
  weights_cache_file: "data/factors/rolling_ic_weights.pkl"

dynamic_ic_selector:
  candidates:
    - "factor:LOW0"
    - "inverse_factor:KUP"
    - "inverse_factor:KLEN"
    - "inverse_factor:KLOW"
    - "inverse_factor:CORR5"
    - "factor:ROC20"
    - "factor:ROC30"
    - "factor:RSV5"
  horizon: 20
  window: 504
  min_periods: 120
  min_obs: 20
  method: "spearman"
  metric: "mean"
  top_k: 1
  fallback_candidate: "factor:LOW0"

liquidity_filter:
  enabled: true
  field: "amount"
  window: 10
  min_periods: 5
  quantile: 0.35
  side: "low"

strategy:
  top_n: 15
  max_turnover: 1
  rank_buffer: 20
  factor_group: "dynamic_ic_selector"
  rebalance_freq: "monthly"
  take_profit_pct: 0.5
  circuit_breaker_drawdown: 0.12
  circuit_breaker_cooldown_days: 20
  min_cross_section_obs: 5

backtest:
  initial_capital: 1000000
  commission: 0.0003
  min_commission_per_order: 5.0
  stamp_tax: 0.001
  transfer_fee: 0.00001
  annual_trading_days: 252
  trade_price_field: "open"
  valuation_price_field: "close"
  slippage: 0.001
  max_participation_rate: 0.05
  capacity_window: 20
  capacity_warning_threshold: 0.05
  amount_unit: 1000.0
  stale_price_exit_days: 20
  stale_price_haircut: 0.5

quality:
  min_raw_coverage: 0.95
  min_price_coverage: 0.95
  min_factor_coverage: 0.95
  require_latest_end_date: true
  min_validation_windows: 3
  min_positive_return_rate: 0.5
  min_sharpe_mean: 0.0
  max_drawdown_limit: -0.20
  target_annual_return: 0.20
  min_optimizer_annual_return: 0.20
  min_backtest_annual_return: 0.20
  max_backtest_drawdown_limit: -0.20
  max_annual_turnover: 20.0
  max_annual_trade_cost_ratio: 0.2

account:
  file: "config/account.yaml"
  current_holdings_file: "config/current_holdings.csv"
  total_asset: 1000000
  cash: 0.0
  max_position_pct: null
  lot_size: 100
  star_market_lot_size: 200

reports:
  history_dir: "outputs/history"

outputs:
  dir: "outputs"
  holdings_file: "outputs/latest_holdings.csv"

